<head>
	<h1>Employer details</h1>

<body>
	<form class="form">
	<fieldset>
		<legend>EMPLOYER DETAILS </legend
		<label class="form-label">Employee :</label>
		<input class="form-control-sm" type="name" placeholder="your name" /><br>
		
		<label class="form-label">Last name :</label>
		<input class="form-control-sm" type="name" placeholder="your last name"><br><br>
		
		<label class="form-label">Select your gender :</label>
		<label >Male</label><input type="radio" name="gender" />
		<label >Female</label><input type="radio" name="gender" /> <br><br>
		
		<label class="form-label">select your DOB :</label>
		<input class="form-control-sm" type="date" /> <br><br>
		
		<label class="form-label">Enter Your age :</label>
		<input class="form-control-sm" type="number" value="23"/><br><br>
		
		<label class="form-label">Enter your salary :</label>
		<input class="form-control-sm" type="number" /><br><br>
		
		<input class="btn btn-primary" type="submit" />
		<input class="btn btn-primary" type="reset" value="reset" />
	</fieldset>
	</form>
