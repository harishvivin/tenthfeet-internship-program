<!DOCTYPE html>
<html>
<head>
	<link href="./formstyles.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body style="background-color:#f5ebe0">
	<header>
		<div class="navbar navbar-expand-lg text-white bg-dark" >
			<div class="p-2 nav-elements">
				<h3>Online Job Application Form</h3>
			</div>
		</div>
	</header>
	<div class="mb-2" id="header" style="background-color:#f5ebe0">
	<h1 class="pb-2 fw-bold">Job Application Form</h1>
	<p>Please fill out the form below to submit your Job Application!</p>
	</div>
	<form class="container border-dark border-top" style="background-color:#f5ebe0">
		<label class="form-titles">Name <label class="text-danger">*</label></label><br><br>
		<input class="form-inputs" type="text" alt="value" placeholder="First Name"/>
		<br>
		<br>
		<br>

		<label class="form-titles">Last Name</label><br><br>
		<input class="form-inputs" type="text" alt="value" placeholder="Last Name" />
		<br>
		<br>
		<br>
		
		<label class="form-titles">E-mail <label class="text-danger">*</label></label><br><br>
		<input class="form-inputs" type="text" alt="value" placeholder="example@gmail.com"/>
		<br>
		<br>
		<br>
		
		<label class="form-titles">Phone number <label class="text-danger">*</label></label><br><br>
		<input class="form-inputs" type="text" alt="value" placeholder="(000) 000-0000"/>
		<br>
		<br>
		<br>
		
		<label class="form-titles">Application Position</label><br><br>
		<input class="form-inputs" type="text" alt="value" />
		<br>
		<br>
		<br>
		
		<label class="form-titles">Preferred Interview Date</label><br><br>
		<input class="form-inputs" type="Date" alt="value" />
		<br>
		<br>
		<br>
		
		<label class="form-titles">Cover Letter</label><br><br>
		<textarea id="text-area" rows="4" cols="50"></textarea>
		<br>
		<br>
		<br>
		
		<label class="form-titles">Upload Resume</label><br><br>
		<input id="upload-area" type="file" rows="100" cols="100"/>
		<br>
		<br>	
		<br>
		
		<div class="d-flex justify-content-center">
		<input class="btn btn-primary d-flex justify-content-center "  type="button" value="Apply"/><br><br>
		</div>
		<div class="form-check border-bottom border-dark " >
		<input class="form-check-input" type="checkbox"/>
		<label class="form-check-label  me-4 mb-4">I hereby declare that all the information provided in this application is true to the best of my knowledge and belief. I understand that if any part of the information is found to be false or incorrect, my candidature is liable to be cancelled.</label>
		</div>
		<br>
		<br>
		<br>
		
		<div>
		<a class="btn btn-secondary" href="./index.html">Go back</a>
		</div>
		
		
	</form>
	


</body>
</html>
